services:
  postgres_dev:
    image: postgres:16-alpine
    container_name: skillsmatch_dev
    environment:
      POSTGRES_USER: skillsmatch
      POSTGRES_PASSWORD: skillsmatch
      POSTGRES_DB: skillsmatch_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres_test:
    image: postgres:16-alpine
    container_name: skillsmatch_test
    environment:
      POSTGRES_USER: skillsmatch
      POSTGRES_PASSWORD: skillsmatch
      POSTGRES_DB: skillsmatch_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_dev_data:
  postgres_test_data:
